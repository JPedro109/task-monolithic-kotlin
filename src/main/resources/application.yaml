app:
  name: task-service
  environment: ${ENVIRONMENT_NAME:local}
  server:
    port: ${SERVER_PORT:8080}
  log:
    level: ${APP_LOG_LEVEL:INFO}

server:
  port: ${app.server.port}
  shutdown: graceful
  forward-headers-strategy: framework

spring:
  application:
    name: ${app.name}
  lifecycle:
    timeout-per-shutdown-phase: 60s
  profiles:
    active: ${app.environment}
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:task}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
  jpa:
    hibernate:
      ddl-auto: validate

security:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-chars}
    access-token-expiration-ms: ${JWT_ACCESS_EXPIRATION_MS:900000}
    refresh-token-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

springdoc:
  api-docs:
    enabled: ${DOC_ENABLED:true}
  swagger-ui:
    operation-sorter: method
    path: /docs
    enabled: ${DOC_ENABLED:true}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
      path-mapping:
        health: healthcheck
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
  endpoint:
    health:
      probes:
        enabled: true
      group:
        live:
          include: livenessState
        ready:
          include: readinessState
        complete:
          include: diskSpace, readinessState, livenessState
          show-components: always
          show-details: always
  metrics:
    enable:
      all: true
      spring:
          security: false
    distribution:
      percentiles-histogram:
        http.server.requests: true
      distribution:
        slo:
          http.server.requests: 5ms, 10ms, 100ms, 150ms, 250ms, 500ms, 1s, 3s, 5s, 10s, 15s, 20s, 25s, 30s
    export:
      otlp:
        enabled: ${ENABLE_OTLP_COLLECTOR:false}
        url: ${OTLP_COLLECTOR_URL}
        step: ${OTLP_COLLECTOR_PUSH_INTERVAL:1s}
  tracing:
    enable: ${ENABLE_TRACING:true}
    sampling:
      probability: 1.0
    baggage:
      remote-fields:
        - correlation-id
        - user-id
      correlation:
        enabled: true
        fields:
          - correlation-id
          - user-id

logging:
    level:
        com.jpmns.task: ${app.log.level}
        org.springframework.security: OFF
    pattern:
        correlation: "[correlation-id=%X{correlation-id}] [user-id=%X{user-id}] [method=%X{method}] [uri=%X{path}] "
